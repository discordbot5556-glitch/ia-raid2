<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IIAA Admin Controller</title>
    <style>
        body { background-image: url('名前なし(1).jpg'); background-size: cover; background-attachment: fixed; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.9); width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #ff5c7e; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; background: #ff5c7e; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 10px; font-weight: bold; margin-top: 15px; }
        #terminal { background: #000; color: #0f0; height: 100px; overflow-y: auto; padding: 10px; margin-top: 10px; font-size: 12px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2>IIAA Admin</h2>
    <input type="password" id="token" placeholder="トークンを入力">
    <input type="text" id="guildId" placeholder="サーバーID">
    <button onclick="fetchChannels()">チャンネル取得</button>
    <select id="channelSelect" onchange="document.getElementById('manualId').value=this.value">
        <option value="">-- 選択 --</option>
    </select>
    <input type="text" id="manualId" placeholder="チャンネルID">
    <textarea id="message">@everyone いあ帝国参上！</textarea>
    <button class="btn-main" onclick="start()">送信開始</button>
    <div id="terminal">> Ready...</div>
</div>

<script>
    // あなた専用のURLを設定済み
    const PROXY = "https://super-thunder-c2eb.discord-bot5556.workers.dev/?url=";

    const log = m => { const t = document.getElementById('terminal'); t.innerHTML += `<div>${m}</div>`; t.scrollTop = t.scrollHeight; };

    async function fetchChannels() {
        const t = document.getElementById('token').value;
        const g = document.getElementById('guildId').value;
        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/guilds/${g}/channels`), {
                headers: { "Authorization": t }
            });
            const data = await res.json();
            const sel = document.getElementById('channelSelect');
            data.filter(c => c.type === 0).forEach(c => {
                let o = document.createElement('option');
                o.value = c.id; o.textContent = c.name; sel.appendChild(o);
            });
            log("取得成功！");
        } catch (e) { log("取得失敗"); }
    }

    async function start() {
        const t = document.getElementById('token').value;
        const c = document.getElementById('manualId').value;
        const m = document.getElementById('message').value;
        log("送信中...");
        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/channels/${c}/messages`), {
                method: "POST",
                headers: { "Authorization": t, "Content-Type": "application/json" },
                body: JSON.stringify({ content: m })
            });
            if(res.ok) log("送信成功！");
            else log("エラー: " + res.status);
        } catch (e) { log("通信エラー"); }
    }
</script>
</body>
</html>
